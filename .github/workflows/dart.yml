name: Flutter CI

on: [ push ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v2
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
      - run: flutter pub get
      - run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
      # Golden tests (test/golden/) are intentionally excluded: goldens are
      # generated locally on macOS and fail on Linux CI due to font/Material
      # rendering differences. They remain runnable locally with `flutter test`.
      - run: flutter test test/unit test/widget
      - run: flutter build apk --debug
      - run: flutter build appbundle --debug
