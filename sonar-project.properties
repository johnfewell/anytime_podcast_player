sonar.projectKey=johnfewell_anytime_podcast_player
sonar.organization=johnfewell

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=anytime_podcast_player
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

# Skip C/C++/Objective-C analysis — the iOS/Android native sources live
# alongside the Flutter app and SonarQube's CFamily analyzer requires a
# compilation database we don't generate in CI.
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-

# Keep the scan focused on the Flutter/Dart sources — the Swift/Kotlin
# native code under ios/ and android/ requires a full Xcode/Gradle
# toolchain to analyze meaningfully, which we don't run in this CI.
sonar.exclusions=ios/**,android/**

# lcov report produced by `flutter test --coverage` — the build workflow
# generates this before invoking the SonarQube scanner.
sonar.dart.coverage.reportPaths=coverage/lcov.info

# Exclude platform-integration entry points from coverage. The WorkManager
# background dispatcher wires real platform services together (path_provider,
# FlutterGemma, SembastRepository) and only runs meaningfully inside a real
# Android background isolate; unit-testing it would require mocking every
# transitive service and gives no real signal.
sonar.coverage.exclusions=lib/services/analysis/background/background_analysis_dispatcher.dart
