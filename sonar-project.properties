sonar.projectKey=johnfewell_anytime_podcast_player
sonar.organization=johnfewell

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=anytime_podcast_player
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

# Skip C/C++/Objective-C analysis — the iOS/Android native sources live
# alongside the Flutter app and SonarQube's CFamily analyzer requires a
# compilation database we don't generate in CI.
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-
